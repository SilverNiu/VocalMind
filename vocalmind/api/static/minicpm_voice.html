<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VocalMind MiniCPM-o 4.5 Realtime</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #667085;
        --line: #d9e0ea;
        --brand: #246bfe;
        --brand-dark: #174ec8;
        --danger: #dc3a4d;
        --bg: #eef4fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 12%, rgba(36, 107, 254, 0.15), transparent 28rem),
          radial-gradient(circle at 84% 24%, rgba(21, 179, 146, 0.12), transparent 24rem),
          var(--bg);
      }

      main {
        width: min(960px, calc(100vw - 32px));
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        align-content: center;
        gap: 18px;
        padding: 32px 0;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .status {
        min-width: 168px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.75);
        color: var(--muted);
        text-align: center;
        font-size: 14px;
        backdrop-filter: blur(12px);
      }

      .panel {
        display: grid;
        grid-template-columns: 1fr 1.25fr;
        gap: 18px;
        align-items: stretch;
      }

      .controls,
      .transcript {
        border: 1px solid rgba(217, 224, 234, 0.9);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 24px 70px rgba(20, 36, 64, 0.09);
        backdrop-filter: blur(18px);
      }

      .controls {
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .avatar {
        aspect-ratio: 1;
        width: min(240px, 72vw);
        margin: 0 auto;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 48%, #ffffff 0 32%, transparent 33%),
          conic-gradient(from 140deg, #246bfe, #14b894, #ffd166, #246bfe);
        box-shadow: inset 0 0 0 22px rgba(255, 255, 255, 0.62);
      }

      .avatar::before {
        content: "";
        width: 45%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--brand);
        transform: scale(var(--level, 0.35));
        transition: transform 120ms ease;
        box-shadow: 0 0 0 12px rgba(36, 107, 254, 0.1);
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      button {
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.54;
      }

      .start {
        color: white;
        background: var(--brand);
      }

      .start:not(:disabled):hover {
        background: var(--brand-dark);
      }

      .stop {
        color: white;
        background: var(--danger);
      }

      .stop:not(:disabled):hover {
        background: #b52d3e;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.65;
      }

      .transcript {
        min-height: 480px;
        max-height: min(70vh, 640px);
        padding: 18px;
        overflow: auto;
      }

      .line {
        width: fit-content;
        max-width: 88%;
        margin: 0 0 12px;
        padding: 12px 14px;
        border-radius: 8px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .line.system {
        width: 100%;
        max-width: none;
        color: var(--muted);
        background: #f6f8fb;
      }

      .line.assistant {
        background: #eef5ff;
        color: #173c78;
      }

      .line.error {
        background: #fff1f3;
        color: #a61b32;
      }

      @media (max-width: 760px) {
        header,
        .panel {
          grid-template-columns: 1fr;
        }

        header {
          align-items: stretch;
        }

        .status {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>VocalMind 语音陪伴</h1>
        <div class="status" id="status">未连接</div>
      </header>

      <section class="panel">
        <div class="controls">
          <div class="avatar" id="avatar" aria-hidden="true"></div>
          <div class="button-row">
            <button class="start" id="startButton">开始对话</button>
            <button class="stop" id="stopButton" disabled>结束</button>
          </div>
          <div class="meta">
            建议使用耳机；浏览器麦克风权限只在本页面使用。服务端会把音频流转发到 MiniCPM-o 4.5 Realtime API。
          </div>
        </div>

        <div class="transcript" id="transcript" aria-live="polite">
          <div class="line system">点击开始后，说一句中文试试。</div>
        </div>
      </section>
    </main>

    <script>
      const INPUT_SAMPLE_RATE = 16000;
      const OUTPUT_SAMPLE_RATE = 24000;
      const MAX_BUFFERED_BYTES = 1_000_000;

      const startButton = document.getElementById("startButton");
      const stopButton = document.getElementById("stopButton");
      const statusEl = document.getElementById("status");
      const avatarEl = document.getElementById("avatar");
      const transcriptEl = document.getElementById("transcript");

      let ws = null;
      let ready = false;
      let stream = null;
      let audioContext = null;
      let micSource = null;
      let processor = null;
      let nextPlayTime = 0;
      let currentAssistantLine = null;

      startButton.addEventListener("click", startSession);
      stopButton.addEventListener("click", () => stopSession(true));

      async function startSession() {
        startButton.disabled = true;
        stopButton.disabled = false;
        setStatus("连接 MiniCPM...");

        const scheme = window.location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(`${scheme}://${window.location.host}/voice/minicpm`);

        ws.addEventListener("open", () => setStatus("等待会话就绪..."));
        ws.addEventListener("message", handleServerMessage);
        ws.addEventListener("error", () => addLine("error", "WebSocket 连接出错。"));
        ws.addEventListener("close", () => stopSession(false));
      }

      async function startMicrophone() {
        if (stream) return;

        audioContext = audioContext || new AudioContext();
        await audioContext.resume();

        stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
          },
        });

        micSource = audioContext.createMediaStreamSource(stream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        processor.onaudioprocess = (event) => {
          event.outputBuffer.getChannelData(0).fill(0);
          if (!ready || !ws || ws.readyState !== WebSocket.OPEN) return;
          if (ws.bufferedAmount > MAX_BUFFERED_BYTES) return;

          const input = event.inputBuffer.getChannelData(0);
          updateInputLevel(input);
          const pcm16k = resampleFloat32(input, audioContext.sampleRate, INPUT_SAMPLE_RATE);
          const encoded = float32ToBase64(pcm16k);
          ws.send(
            JSON.stringify({
              type: "input.append",
              input: {
                audio: encoded,
                force_listen: false,
              },
            })
          );
        };

        micSource.connect(processor);
        processor.connect(audioContext.destination);
      }

      function handleServerMessage(event) {
        let message;
        try {
          message = JSON.parse(event.data);
        } catch {
          return;
        }

        if (message.type === "proxy.ready") {
          ready = true;
          setStatus("正在听你说");
          startMicrophone().catch((error) => {
            addLine("error", `无法打开麦克风：${error.message || error}`);
            stopSession(true);
          });
          return;
        }

        if (message.type === "proxy.error") {
          addLine("error", message.detail || message.message || "MiniCPM 代理出错。");
          setStatus("连接失败");
          return;
        }

        if (message.type === "session.queued") {
          setStatus("排队中...");
          return;
        }

        if (message.type === "response.output.delta") {
          handleOutputDelta(message);
          return;
        }

        if (message.type === "response.done") {
          currentAssistantLine = null;
        }
      }

      function handleOutputDelta(message) {
        const kind = message.kind || message.payload?.kind;
        const text = message.text ?? message.delta ?? message.payload?.text ?? message.payload?.delta;
        const audio = message.audio ?? message.data ?? message.payload?.audio ?? message.payload?.data;

        if (kind === "listen") {
          currentAssistantLine = null;
          setStatus("正在听你说");
          return;
        }

        if (kind === "text" && text) {
          setStatus("MiniCPM 回复中");
          appendAssistantText(text);
        }

        if (kind === "audio" && audio) {
          playAudioChunk(audio);
        }
      }

      function playAudioChunk(base64Audio) {
        if (!audioContext) return;
        const pcm = base64ToFloat32(base64Audio);
        if (!pcm.length) return;

        const buffer = audioContext.createBuffer(1, pcm.length, OUTPUT_SAMPLE_RATE);
        buffer.copyToChannel(pcm, 0);

        const source = audioContext.createBufferSource();
        source.buffer = buffer;
        source.connect(audioContext.destination);

        const now = audioContext.currentTime;
        if (nextPlayTime < now) nextPlayTime = now + 0.03;
        source.start(nextPlayTime);
        nextPlayTime += buffer.duration;
      }

      function stopSession(closeSocket) {
        ready = false;
        startButton.disabled = false;
        stopButton.disabled = true;
        setStatus("未连接");
        avatarEl.style.setProperty("--level", "0.35");
        currentAssistantLine = null;
        nextPlayTime = 0;

        if (processor) {
          processor.disconnect();
          processor.onaudioprocess = null;
          processor = null;
        }
        if (micSource) {
          micSource.disconnect();
          micSource = null;
        }
        if (stream) {
          stream.getTracks().forEach((track) => track.stop());
          stream = null;
        }
        if (closeSocket && ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "proxy.close" }));
          ws.close();
        }
        ws = null;
      }

      function appendAssistantText(text) {
        if (!currentAssistantLine) {
          currentAssistantLine = addLine("assistant", "");
        }
        currentAssistantLine.textContent += text;
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      }

      function addLine(kind, text) {
        const el = document.createElement("div");
        el.className = `line ${kind}`;
        el.textContent = text;
        transcriptEl.appendChild(el);
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
        return el;
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function updateInputLevel(samples) {
        let sum = 0;
        for (let i = 0; i < samples.length; i += 1) {
          sum += samples[i] * samples[i];
        }
        const rms = Math.sqrt(sum / samples.length);
        const level = Math.min(1.2, 0.35 + rms * 10);
        avatarEl.style.setProperty("--level", level.toFixed(3));
      }

      function resampleFloat32(input, sourceRate, targetRate) {
        if (sourceRate === targetRate) return new Float32Array(input);
        const ratio = sourceRate / targetRate;
        const outputLength = Math.max(1, Math.floor(input.length / ratio));
        const output = new Float32Array(outputLength);

        for (let i = 0; i < outputLength; i += 1) {
          const start = Math.floor(i * ratio);
          const end = Math.min(Math.floor((i + 1) * ratio), input.length);
          let total = 0;
          let count = 0;
          for (let j = start; j < end; j += 1) {
            total += input[j];
            count += 1;
          }
          output[i] = count ? total / count : input[start] || 0;
        }
        return output;
      }

      function float32ToBase64(floatArray) {
        return bytesToBase64(new Uint8Array(floatArray.buffer));
      }

      function base64ToFloat32(base64) {
        const bytes = base64ToBytes(base64);
        const byteLength = bytes.byteLength - (bytes.byteLength % 4);
        if (byteLength <= 0) return new Float32Array();
        const buffer = bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + byteLength);
        return new Float32Array(buffer);
      }

      function bytesToBase64(bytes) {
        let binary = "";
        const chunkSize = 0x8000;
        for (let i = 0; i < bytes.length; i += chunkSize) {
          const chunk = bytes.subarray(i, i + chunkSize);
          binary += String.fromCharCode.apply(null, chunk);
        }
        return btoa(binary);
      }

      function base64ToBytes(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
      }
    </script>
  </body>
</html>
